<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Book</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 24px 16px;
      color: #222;
    }
    .container { max-width: 600px; margin: 0 auto; }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #888; margin-bottom: 24px; }

 
    .card {
      background: white; border-radius: 10px;
      padding: 20px; margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .card h2 { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; }

   
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .form-grid .full { grid-column: 1 / -1; }
    label { display: block; font-size: 11px; font-weight: 600; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    input[type=text], input[type=email], input[type=tel] {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd;
      border-radius: 7px; font-size: 14px; color: #222;
      outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus { border-color: #2563eb; }
    .error-msg { font-size: 12px; color: #dc2626; min-height: 16px; margin-bottom: 8px; }

   
    .btn {
      padding: 9px 18px; border: none; border-radius: 7px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #555; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

   
    .search-wrap { position: relative; margin-bottom: 0; }
    .search-wrap input {
      width: 100%; padding: 9px 12px 9px 36px;
      border: 1px solid #ddd; border-radius: 7px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    .search-wrap input:focus { border-color: #2563eb; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #aaa; }

    /* Contact list */
    .contact-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .contact-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: #f9fafb;
      border: 1px solid #eee; border-radius: 8px;
      transition: border-color 0.15s;
    }
    .contact-item:hover { border-color: #d1d5db; }
    .contact-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #2563eb; color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0; margin-right: 12px;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 14px; font-weight: 600; color: #111; }
    .contact-phone { font-size: 12px; color: #888; margin-top: 1px; }
    .contact-actions { display: flex; gap: 6px; flex-shrink: 0; }

    
    .empty { text-align: center; padding: 28px; color: #bbb; font-size: 13px; }

    
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 12px;
      padding: 24px; width: 100%; max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* Count badge */
    .count-badge {
      display: inline-block; background: #eff6ff; color: #2563eb;
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 10px; margin-left: 8px; vertical-align: middle;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #111; color: white; padding: 10px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📒 Contact Book</h1>
    <p class="page-sub">Store and manage your contacts</p>

  
    <div class="card">
      <h2>Add New Contact</h2>
      <div class="form-grid">
        <div>
          <label>Name *</label>
          <input type="text" id="addName" placeholder="Full name"/>
        </div>
        <div>
          <label>Phone *</label>
          <input type="tel" id="addPhone" placeholder="Phone number"/>
        </div>
        <div>
          <label>Email</label>
          <input type="email" id="addEmail" placeholder="Email address"/>
        </div>
        <div>
          <label>Address</label>
          <input type="text" id="addAddress" placeholder="Address"/>
        </div>
      </div>
      <div class="error-msg" id="addError"></div>
      <button class="btn btn-primary" onclick="addContact()">Add Contact</button>
    </div>

    
    <div class="card">
      <h2>
        All Contacts
        <span class="count-badge" id="countBadge">0</span>
      </h2>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name or phone..." oninput="searchContacts()"/>
      </div>
      <div class="contact-list" id="contactList">
        <div class="empty">No contacts yet. Add one above!</div>
      </div>
    </div>
  </div>

  
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h2>Edit Contact</h2>
      <input type="hidden" id="editId"/>
      <div class="form-grid">
        <div>
          <label>Name *</label>
          <input type="text" id="editName" placeholder="Full name"/>
        </div>
        <div>
          <label>Phone *</label>
          <input type="tel" id="editPhone" placeholder="Phone number"/>
        </div>
        <div>
          <label>Email</label>
          <input type="email" id="editEmail" placeholder="Email address"/>
        </div>
        <div>
          <label>Address</label>
          <input type="text" id="editAddress" placeholder="Address"/>
        </div>
      </div>
      <div class="error-msg" id="editError"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>


  <div class="toast" id="toast"></div>

  <script>
    let allContacts = [];
    let isSearching = false;

    // Load on start
    loadContacts();

    async function loadContacts() {
      const res = await fetch('/contacts');
      allContacts = await res.json();
      renderList(allContacts);
      document.getElementById('countBadge').textContent = allContacts.length;
    }

    function renderList(contacts) {
      const list = document.getElementById('contactList');
      if (contacts.length === 0) {
        list.innerHTML = isSearching
          ? '<div class="empty">No contacts found for your search.</div>'
          : '<div class="empty">No contacts yet. Add one above!</div>';
        return;
      }
      list.innerHTML = contacts.map(c => `
        <div class="contact-item">
          <div class="contact-avatar">${c.name.charAt(0).toUpperCase()}</div>
          <div class="contact-info">
            <div class="contact-name">${escHtml(c.name)}</div>
            <div class="contact-phone">${escHtml(c.phone)}${c.email ? ' · ' + escHtml(c.email) : ''}</div>
          </div>
          <div class="contact-actions">
            <button class="btn btn-secondary btn-sm" onclick="openEdit(${c.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteContact(${c.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function addContact() {
      const name    = document.getElementById('addName').value.trim();
      const phone   = document.getElementById('addPhone').value.trim();
      const email   = document.getElementById('addEmail').value.trim();
      const address = document.getElementById('addAddress').value.trim();
      document.getElementById('addError').textContent = '';

      const res = await fetch('/contacts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, email, address })
      });
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('addError').textContent = data.error;
        return;
      }

     
      ['addName','addPhone','addEmail','addAddress'].forEach(id => document.getElementById(id).value = '');
      showToast('Contact added!');
      loadContacts();
      isSearching = false;
      document.getElementById('searchInput').value = '';
    }

    async function deleteContact(id) {
      if (!confirm('Delete this contact?')) return;
      await fetch(`/contacts/${id}`, { method: 'DELETE' });
      showToast('Contact deleted.');
      loadContacts();
    }

    function openEdit(id) {
      const c = allContacts.find(c => c.id === id);
      if (!c) return;
      document.getElementById('editId').value      = c.id;
      document.getElementById('editName').value    = c.name;
      document.getElementById('editPhone').value   = c.phone;
      document.getElementById('editEmail').value   = c.email || '';
      document.getElementById('editAddress').value = c.address || '';
      document.getElementById('editError').textContent = '';
      document.getElementById('editModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('open');
    }

    async function saveEdit() {
      const id      = parseInt(document.getElementById('editId').value);
      const name    = document.getElementById('editName').value.trim();
      const phone   = document.getElementById('editPhone').value.trim();
      const email   = document.getElementById('editEmail').value.trim();
      const address = document.getElementById('editAddress').value.trim();
      document.getElementById('editError').textContent = '';

      const res = await fetch(`/contacts/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, email, address })
      });
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('editError').textContent = data.error;
        return;
      }
      closeModal();
      showToast('Contact updated!');
      loadContacts();
    }

    async function searchContacts() {
      const q = document.getElementById('searchInput').value.trim();
      isSearching = q.length > 0;
      if (!isSearching) { renderList(allContacts); return; }
      const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
      const results = await res.json();
      renderList(results);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

  
    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.activeElement.id.startsWith('add')) addContact();
    });
  </script>
</body>
</html>
